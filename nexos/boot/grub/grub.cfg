# NexOS — boot/grub/grub.cfg | GRUB 2 boot configuration | MIT License

set default=0
set timeout=5
set timeout_style=countdown

insmod all_video
insmod gfxterm
insmod vbe

set gfxmode=800x600
terminal_output gfxterm

set color_normal=white/black
set color_highlight=white/blue
set menu_color_normal=white/black
set menu_color_highlight=white/blue

background_color black

menuentry "NexOS" {
    insmod multiboot2
    multiboot2 /boot/nexos.kernel
    boot
}

menuentry "NexOS (Safe Mode)" {
    insmod multiboot2
    multiboot2 /boot/nexos.kernel safemode=1
    boot
}

menuentry "Reboot" {
    reboot
}
